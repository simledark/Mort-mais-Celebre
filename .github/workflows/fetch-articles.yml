name: Mise à jour des articles

on:
  schedule:
    # Toutes les 6h (UTC) : 00h, 06h, 12h, 18h
    - cron: '0 0,6,12,18 * * *'
  # Permet de lancer manuellement depuis GitHub
  workflow_dispatch:
  # Lance aussi à chaque push (pour tester)
  push:
    paths:
      - 'scripts/fetch_articles.py'

jobs:
  fetch-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Récupérer les articles RSS
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/fetch_articles.py

      - name: Commit et push articles.json
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour automatique des articles [$(date '+%d/%m/%Y %H:%M')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
